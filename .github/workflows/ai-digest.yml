name: AI最新情報ダイジェスト

on:
  schedule:
    # 2日ごと 09:04 JST (00:04 UTC)
    - cron: "4 0 */2 * *"
  workflow_dispatch:  # 手動実行も可能

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run AI Tracker
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python ai_tracker.py
